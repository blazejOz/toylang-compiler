name: CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM 20 and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg cmake
          export UBUNTU_CODENAME=jammy
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20

      - name: Configure CMake
        run: cmake -B build -DLLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm

      - name: Build Project
        run: cmake --build build

      - name: Test Executable
        run: ./build/compiler

      - name: Run Tests
        run: ./build/unit_tests