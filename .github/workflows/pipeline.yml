name: CI Build and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM 21 (Runner)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg cmake software-properties-common
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all

      - name: Build and Run Tests
        run: |
          cmake -B build -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm -DBUILD_TESTING=ON
          cmake --build build -j$(nproc)
          ./build/unit_tests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/blazejoz/toylang-compiler:latest
          #use github actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max